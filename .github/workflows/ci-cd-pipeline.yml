# GitHub Actions CI/CD pipeline for building and deploying the application
# to an Azure Web App.
#
# Prerequisites:
#   * A service principal in Azure with Contributor rights to the resource group.
#   * Secret named AZURE_CREDENTIALS containing the JSON output of
#     `az ad sp create-for-rbac --name "my-sp" --sdk-auth`.
#   * Secret named AZURE_WEBAPP_PUBLISH_PROFILE containing the Web App
#     publish profile XML (or you can use the AZURE_CREDENTIALS/APP_NAME
#     pattern below).
#   * Optionally AZURE_WEBAPP_NAME if you want to pass the app name via env.

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up .NET (if your project uses it)
        # this step is safe to run even if no .csproj files exist
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Set up Node.js (if your project uses it)
        # safe to run even without a package.json
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Restore dependencies
        run: |
          if [ -f "*.csproj" ] || ls src/**/*.csproj 1> /dev/null 2>&1; then
            dotnet restore
          fi
          if [ -f "package.json" ]; then
            npm install
          fi

      - name: Build
        run: |
          if [ -f "*.csproj" ] || ls src/**/*.csproj 1> /dev/null 2>&1; then
            dotnet build --configuration Release --no-restore
          fi
          if [ -f "package.json" ]; then
            npm run build || true
          fi

      - name: Run tests
        run: |
          if [ -f "*.csproj" ] || ls src/**/*.csproj 1> /dev/null 2>&1; then
            dotnet test --no-build --verbosity normal
          fi
          if [ -f "package.json" ]; then
            npm test || true
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          # either use publish-profile or service principal
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # or use service principal & app name
          # app-name: ${{ env.AZURE_WEBAPP_NAME }}
          # slot-name: Production
          package: '.'
